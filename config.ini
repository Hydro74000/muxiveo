# =============================================================================
# Muxiveo — Configuration file
# =============================================================================
#
# Ce fichier est lu au démarrage et a PRIORITÉ sur les valeurs sauvegardées
# par l'application (QSettings). Il permet de fixer des paramètres sans
# passer par l'interface.
#
# Syntaxe :
#   - Les lignes commençant par # sont des commentaires (ignorées).
#   - Une valeur vide (key =) ou commentée revient au comportement par défaut.
#   - Les chemins peuvent être absolus ou relatifs au dossier de travail.
#
# =============================================================================


# -----------------------------------------------------------------------------
# [paths] — Répertoires utilisés par l'application
# -----------------------------------------------------------------------------
[paths]

# Répertoire des fichiers intermédiaires (travail temporaire).
# Par défaut : /tmp/Muxiveo_work  (Linux/macOS)
#              %TEMP%\Muxiveo_work (Windows)
# work_dir = /tmp/Muxiveo_work

# Répertoire de sortie des fichiers produits.
# Par défaut : ~/Videos  (ou le dossier Vidéos de l'OS)
# output_dir = ~/Videos


# -----------------------------------------------------------------------------
# [tools] — Chemins des exécutables externes
# -----------------------------------------------------------------------------
# Ces entrées sont OPTIONNELLES. Si elles sont vides ou commentées,
# l'application utilise l'autodetect (recherche dans le PATH système).
# Spécifier un chemin absolu ici permet d'utiliser une version spécifique
# d'un outil sans modifier le PATH.
#
# Exemple Windows : ffmpeg = C:\ffmpeg\bin\ffmpeg.exe
# Exemple Linux   : ffmpeg = /opt/ffmpeg/bin/ffmpeg
[tools]

# ffmpeg         = ffmpeg
# ffprobe        = ffprobe
# mkvmerge       = mkvmerge
# mkvextract     = mkvextract
# mkvinfo        = mkvinfo
# mediainfo      = mediainfo
# dovi_tool      = dovi_tool
# hdr10plus_tool = hdr10plus_tool
# eac3to         = eac3to


# -----------------------------------------------------------------------------
# [hdr] — Paramètres Dolby Vision / HDR10+
# -----------------------------------------------------------------------------
[hdr]

# Profil Dolby Vision utilisé lors de l'injection RPU.
# Valeurs courantes : 5 (FEL), 7 (MEL), 8 (sans base layer)
# dovi_profile = 8

# Compatibility ID pour le profil Dolby Vision.
# dovi_compat_id = 1


# -----------------------------------------------------------------------------
# [encoding] — Options d'encodage
# -----------------------------------------------------------------------------
[encoding]

# Utiliser /dev/shm (RAM tmpfs) pour les fichiers HEVC intermédiaires.
# Accélère le traitement mais nécessite suffisamment de RAM libre.
# Valeurs : true | false
# ram_buffer_enabled = true

# Pourcentage minimal de RAM totale devant rester libre pour activer le buffer.
# Si la RAM libre est inférieure à ce seuil, le buffer est désactivé automatiquement.
# ram_buffer_threshold_pct = 15


# -----------------------------------------------------------------------------
# [ui] — Interface utilisateur
# -----------------------------------------------------------------------------
[ui]

# Nombre maximum de lignes conservées dans le panneau de log.
# log_max_lines = 2000

# Thème de l'interface. Valeurs : dark | light
# theme = dark
