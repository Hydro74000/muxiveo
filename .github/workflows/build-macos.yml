name: Build macOS package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (ex: 1.3.1)"
        required: false
        default: ""

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "PySide6>=6.6.0" "pymediainfo>=6.1.0" pyinstaller pillow

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VER="${{ github.ref_name }}"
            VER="${VER#v}"
          else
            VER=$(python -c "from core.version import APP_VERSION; print(APP_VERSION)")
          fi
          echo "VERSION=$VER" >> "$GITHUB_OUTPUT"
          echo "Version: $VER"

      - name: Build macOS .app + .dmg
        run: |
          python package.py --dmg --version "${{ steps.version.outputs.VERSION }}"

      - name: Zip .app bundle
        run: |
          cd dist
          zip -r --symlinks "Mediarecode-${{ steps.version.outputs.VERSION }}-macos.zip" Mediarecode.app

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mediarecode-${{ steps.version.outputs.VERSION }}-macos
          path: dist/Mediarecode-${{ steps.version.outputs.VERSION }}-macos.zip
          if-no-files-found: error

      - name: Attach DMG to GitHub Release
        if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          FILE="dist/releases/Mediarecode-${{ steps.version.outputs.VERSION }}.dmg"
          gh release view "$TAG" > /dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --notes ""
          gh release upload "$TAG" "$FILE" --clobber
