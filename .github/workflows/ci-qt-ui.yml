name: Qt UI Tests

# Tests nécessitant PySide6/Qt : widgets, panels, sidebar, i18n, packaging.
# Utilise un display virtuel (Xvfb) pour les tests Qt headless sous Linux.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "ui/**"
      - "core/i18n.py"
      - "core/config.py"
      - "core/runner.py"
      - "tests/test_remux.py"
      - "tests/test_merge_dovi_panel.py"
      - "tests/test_merge_remux_extras.py"
      - "tests/test_main_window_sidebar.py"
      - "tests/test_main_window_startup_panel.py"
      - "tests/test_dashboard_page.py"
      - "tests/test_settings_panel.py"
      - "tests/test_i18n.py"
      - "tests/test_encode_audio_bitrate_ui.py"
      - "tests/test_encode_panel_widgets.py"
      - "tests/test_package.py"
      - "tests/test_launcher.py"
      - "tests/conftest.py"
      - ".github/workflows/ci-qt-ui.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "ui/**"
      - "core/i18n.py"
      - "core/config.py"
      - "core/runner.py"
      - "tests/test_remux.py"
      - "tests/test_merge_dovi_panel.py"
      - "tests/test_merge_remux_extras.py"
      - "tests/test_main_window_sidebar.py"
      - "tests/test_main_window_startup_panel.py"
      - "tests/test_dashboard_page.py"
      - "tests/test_settings_panel.py"
      - "tests/test_i18n.py"
      - "tests/test_encode_audio_bitrate_ui.py"
      - "tests/test_encode_panel_widgets.py"
      - "tests/test_package.py"
      - "tests/test_launcher.py"
      - "tests/conftest.py"
      - ".github/workflows/ci-qt-ui.yml"

jobs:
  qt-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libegl1 libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxkbcommon-x11-0 xvfb

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-qt PySide6

      - name: Run Qt UI Tests
        env:
          DISPLAY: ":99"
          QT_QPA_PLATFORM: "offscreen"
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          pytest \
            tests/test_remux.py \
            tests/test_merge_dovi_panel.py \
            tests/test_merge_remux_extras.py \
            tests/test_main_window_sidebar.py \
            tests/test_main_window_startup_panel.py \
            tests/test_dashboard_page.py \
            tests/test_settings_panel.py \
            tests/test_i18n.py \
            tests/test_encode_audio_bitrate_ui.py \
            tests/test_encode_panel_widgets.py \
            tests/test_package.py \
            tests/test_launcher.py \
            -v
