name: TMDB Smoke Test (Packaged)

# Valide que la récupération réseau TMDB fonctionne dans l'exécutable
# packagé PyInstaller sur Linux / Windows / macOS (chaîne SSL frozen).
#
# Le token bearer TMDB par défaut est hardcodé dans core/media_info_fetcher.py
# → aucun secret GitHub requis.

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - devel-stable
      - levelup
    paths:
      - "launcher.py"
      - "core/media_info_fetcher.py"
      - "package.py"
      - "package_appimage.py"
      - ".github/workflows/tmdb-smoke-packaged.yml"
  pull_request:
    paths:
      - "launcher.py"
      - "core/media_info_fetcher.py"
      - "package.py"
      - "package_appimage.py"
      - ".github/workflows/tmdb-smoke-packaged.yml"

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "PySide6>=6.6.0" "pymediainfo>=6.1.0" certifi pyinstaller

      - name: Install AppImage tooling (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y squashfs-tools zsync

      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          python package_appimage.py --allinc --version ci-smoke
          APPIMAGE=$(ls dist/releases/Mediarecode-x86_64_allinc-*.AppImage 2>/dev/null | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "AppImage introuvable dans dist/releases/" >&2
            ls -la dist/releases/ || true
            exit 1
          fi
          chmod +x "$APPIMAGE"
          echo "PACKAGED_BIN=$APPIMAGE"        >> "$GITHUB_ENV"
          echo "PACKAGED_ARGS=--tmdb-smoke-test" >> "$GITHUB_ENV"

      - name: Build Windows .exe
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # package.py fait PyInstaller onedir → dist/mediarecode/mediarecode.exe
          # (on saute NSIS, inutile pour un smoke test)
          python package.py --version ci-smoke
          $exe = "dist\mediarecode\mediarecode.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Exécutable $exe introuvable"
            Get-ChildItem -Recurse dist | Select-Object -First 50
            exit 1
          }
          "PACKAGED_BIN=$((Resolve-Path $exe).Path)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PACKAGED_ARGS=--tmdb-smoke-test"           | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build macOS onedir binary
        if: runner.os == 'macOS'
        run: |
          # package.py n'a pas de branche macOS dédiée → on invoque PyInstaller
          # directement sur launcher.py (onedir) pour reproduire le même
          # scénario frozen (importlib, SSL, certifi…) que sur les autres OS.
          pyinstaller --noconfirm --onedir --name mediarecode \
            --collect-submodules core \
            --collect-submodules ui \
            --collect-data certifi \
            --hidden-import certifi \
            launcher.py
          BIN="dist/mediarecode/mediarecode"
          if [ ! -x "$BIN" ]; then
            echo "Exécutable $BIN introuvable" >&2
            ls -laR dist | head -100
            exit 1
          fi
          echo "PACKAGED_BIN=$PWD/$BIN"          >> "$GITHUB_ENV"
          echo "PACKAGED_ARGS=--tmdb-smoke-test" >> "$GITHUB_ENV"

      - name: Run TMDB smoke test (packaged)
        shell: bash
        run: |
          echo "Exécutable : $PACKAGED_BIN"
          echo "Arguments  : $PACKAGED_ARGS"
          "$PACKAGED_BIN" $PACKAGED_ARGS
