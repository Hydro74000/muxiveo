name: Build AppImage

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (ex: 1.3.1)"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y squashfs-tools zsync

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "PySide6>=6.6.0" "pymediainfo>=6.1.0" pyinstaller

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VER="${{ github.ref_name }}"
            VER="${VER#v}"
          else
            VER=$(python -c "from core.version import APP_VERSION; print(APP_VERSION)")
          fi
          echo "VERSION=$VER" >> "$GITHUB_OUTPUT"
          echo "Version: $VER"

      - name: Build AppImage (all-inclusive + zsync)
        env:
          # appimagetool est une AppImage — sans FUSE en CI, on force l'extraction
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          python package_appimage.py --allinc --version "${{ steps.version.outputs.VERSION }}"

      - name: Locate output files
        id: files
        run: |
          APPIMAGE=$(ls dist/releases/Mediarecode-x86_64_allinc-*.AppImage 2>/dev/null | head -1)
          ZSYNC=$(ls dist/releases/Mediarecode-x86_64_allinc-*.AppImage.zsync 2>/dev/null | head -1)
          echo "APPIMAGE=$APPIMAGE" >> "$GITHUB_OUTPUT"
          echo "ZSYNC=$ZSYNC"       >> "$GITHUB_OUTPUT"
          echo "AppImage : $APPIMAGE"
          echo "zsync    : $ZSYNC"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mediarecode-x86_64_allinc-${{ steps.version.outputs.VERSION }}
          path: |
            ${{ steps.files.outputs.APPIMAGE }}
            ${{ steps.files.outputs.ZSYNC }}
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.files.outputs.APPIMAGE }}
            ${{ steps.files.outputs.ZSYNC }}
          fail_on_unmatched_files: true
