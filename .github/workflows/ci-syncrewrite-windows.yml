name: Sync Rewrite & Profiles Tests (Windows)

# Pendant Windows du workflow ``ci-syncrewrite.yml`` : valide les chemins
# code Windows réels (named pipes, mmap, séparateurs de chemin, BCP-47).
#
# Sur Windows, ``_IS_WINDOWS`` vaut True nativement : les tests qui le
# monkeypatchent à True deviennent no-op et exécutent la vraie branche
# Windows de ``start_live_demux_session``.
#
# Le bootstrap ``scripts/windows_pytest_bootstrap.py`` stub PySide6 pour
# permettre d'exécuter les tests Qt sans installer Qt sur le runner Windows.

on:
  workflow_dispatch:
  pull_request:
    paths:
      # --- sync rewrite ---
      - "core/workflows/audio_sync.py"
      - "core/workflows/common/sync_rewrite.py"
      - "core/workflows/common/track_types.py"
      - "core/workflows/remux_timeline_sync.py"
      - "core/workflows/remux.py"
      - "core/workflows/remux_models.py"
      - "core/workflows/remux_runtime.py"
      - "core/workflows/remux_sync.py"
      - "core/workflows/encode/remux_bridge.py"
      - "core/workflows/encode/workflow.py"
      - "core/workflows/encode/runtime/command_builders.py"
      - "core/workflows/encode/planning/offsets.py"
      - "core/config.py"
      # --- profils ---
      - "core/profiles/**"
      - "cli/**"
      # --- tests ---
      - "tests/test_audio_sync_workflow.py"
      - "tests/test_workflows_common.py"
      - "tests/test_remux_timeline_sync.py"
      - "tests/test_remux_workflow.py"
      - "tests/test_decision_profiles.py"
      - "tests/test_profiles_selectors.py"
      - "tests/test_cli.py"
      - "tests/conftest.py"
      - "scripts/windows_pytest_bootstrap.py"
      - ".github/workflows/ci-syncrewrite-windows.yml"
  push:
    paths:
      - "core/workflows/audio_sync.py"
      - "core/workflows/common/sync_rewrite.py"
      - "core/workflows/common/track_types.py"
      - "core/workflows/remux_timeline_sync.py"
      - "core/workflows/remux.py"
      - "core/workflows/remux_models.py"
      - "core/workflows/remux_runtime.py"
      - "core/workflows/remux_sync.py"
      - "core/workflows/encode/remux_bridge.py"
      - "core/workflows/encode/workflow.py"
      - "core/workflows/encode/runtime/command_builders.py"
      - "core/workflows/encode/planning/offsets.py"
      - "core/config.py"
      - "core/profiles/**"
      - "cli/**"
      - "tests/test_audio_sync_workflow.py"
      - "tests/test_workflows_common.py"
      - "tests/test_remux_timeline_sync.py"
      - "tests/test_remux_workflow.py"
      - "tests/test_decision_profiles.py"
      - "tests/test_profiles_selectors.py"
      - "tests/test_cli.py"
      - "tests/conftest.py"
      - "scripts/windows_pytest_bootstrap.py"
      - ".github/workflows/ci-syncrewrite-windows.yml"

jobs:
  syncrewrite-windows:
    name: Sync rewrite & profiles tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Test Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          winget install --id Gyan.FFmpeg -e --silent --accept-source-agreements --accept-package-agreements --disable-interactivity
          $ffPath = (Get-ChildItem "$env:LOCALAPPDATA\Microsoft\WinGet\Packages\Gyan.FFmpeg*" -Directory | Select-Object -First 1).FullName
          $binDir = (Get-ChildItem -Path $ffPath -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1).DirectoryName
          echo "$binDir" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          & "$binDir\ffmpeg.exe" -version
          & "$binDir\ffprobe.exe" -version

      - name: Run Sync Rewrite & Profiles Tests
        shell: pwsh
        run: |
          python scripts/windows_pytest_bootstrap.py `
            tests/test_audio_sync_workflow.py `
            tests/test_workflows_common.py `
            tests/test_remux_timeline_sync.py `
            tests/test_remux_workflow.py `
            tests/test_decision_profiles.py `
            tests/test_profiles_selectors.py `
            tests/test_cli.py
