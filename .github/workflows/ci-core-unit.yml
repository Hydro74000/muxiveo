name: Core Unit Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "core/**"
      - "main.py"
      - "locales.json"
      - "tests/test_inspector.py"
      - "tests/test_runner.py"
      - "tests/test_merge_dovi_workflow.py"
      - "tests/test_matroska_header_editor.py"
      - "tests/test_media_info_fetcher.py"
      - "tests/test_encode_models.py"
      - "tests/test_encode_progress.py"
      - "tests/test_encode_hw_devices.py"
      - "tests/test_encode_hardware.py"
      - "tests/test_setup_and_config.py"
      - "tests/test_subprocess_utils.py"
      - "tests/test_nfo_generation.py"
      - "tests/conftest.py"
      - ".github/workflows/ci-core-unit.yml"
  push:
    branches:
      - main
      - master
      - rebrand
    paths:
      - "core/**"
      - "main.py"
      - "locales.json"
      - "tests/test_inspector.py"
      - "tests/test_runner.py"
      - "tests/test_merge_dovi_workflow.py"
      - "tests/test_matroska_header_editor.py"
      - "tests/test_media_info_fetcher.py"
      - "tests/test_encode_models.py"
      - "tests/test_encode_progress.py"
      - "tests/test_encode_hw_devices.py"
      - "tests/test_encode_hardware.py"
      - "tests/test_setup_and_config.py"
      - "tests/test_subprocess_utils.py"
      - "tests/test_nfo_generation.py"
      - "tests/conftest.py"
      - ".github/workflows/ci-core-unit.yml"

jobs:
  core-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libegl1 libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxkbcommon-x11-0

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-qt PySide6

      - name: Run Core Unit Tests
        env:
          QT_QPA_PLATFORM: "offscreen"
        run: |
          pytest \
            tests/test_inspector.py \
            tests/test_runner.py \
            tests/test_merge_dovi_workflow.py \
            tests/test_matroska_header_editor.py \
            tests/test_media_info_fetcher.py \
            tests/test_encode_models.py \
            tests/test_encode_progress.py \
            tests/test_encode_hw_devices.py \
            tests/test_encode_hardware.py \
            tests/test_setup_and_config.py \
            tests/test_subprocess_utils.py \
            tests/test_nfo_generation.py \
            -v
