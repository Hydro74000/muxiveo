name: Build Windows Store upload

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (ex: 1.3.1)"
        required: false
        default: ""

jobs:
  build:
    if: ${{ vars.ENABLE_WINDOWS_STORE_UPLOAD == 'true' }} # Disabled by default: set this repo variable to re-enable Store uploads.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install PySide6>=6.6.0 pymediainfo>=6.1.0 pyinstaller

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $ver = "${{ github.event.inputs.version }}"
          } else {
            $ver = python -c "from core.version import APP_VERSION; print(APP_VERSION)"
          }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "Version: $ver"

      - name: Export Store metadata
        if: github.ref_name != 'rebrand'
        shell: pwsh
        env:
          WINDOWS_MSIX_IDENTITY: ${{ vars.WINDOWS_MSIX_IDENTITY }}
          WINDOWS_MSIX_PUBLISHER: ${{ secrets.WINDOWS_MSIX_PUBLISHER }}
          WINDOWS_MSIX_PUBLISHER_DISPLAY_NAME: ${{ vars.WINDOWS_MSIX_PUBLISHER_DISPLAY_NAME }}
          WINDOWS_MSIX_DESCRIPTION: ${{ vars.WINDOWS_MSIX_DESCRIPTION }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_MSIX_IDENTITY)) {
            throw "Missing repository variable WINDOWS_MSIX_IDENTITY"
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_MSIX_PUBLISHER)) {
            throw "Missing secret WINDOWS_MSIX_PUBLISHER"
          }
          "MUXIVEO_MSIX_IDENTITY=$env:WINDOWS_MSIX_IDENTITY" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MUXIVEO_MSIX_PUBLISHER=$env:WINDOWS_MSIX_PUBLISHER" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          if (-not [string]::IsNullOrWhiteSpace($env:WINDOWS_MSIX_PUBLISHER_DISPLAY_NAME)) {
            "MUXIVEO_MSIX_PUBLISHER_DISPLAY_NAME=$env:WINDOWS_MSIX_PUBLISHER_DISPLAY_NAME" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          if (-not [string]::IsNullOrWhiteSpace($env:WINDOWS_MSIX_DESCRIPTION)) {
            $delim = "EOF_$([guid]::NewGuid().ToString('N'))"
            "MUXIVEO_MSIX_DESCRIPTION<<$delim" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            $env:WINDOWS_MSIX_DESCRIPTION | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            $delim | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Discover Windows SDK tools
        shell: pwsh
        run: |
          $kitsRoot = Join-Path ${env:ProgramFiles(x86)} 'Windows Kits\10\bin'
          if (-not (Test-Path $kitsRoot)) {
            Write-Host "Windows SDK bin root not present yet: $kitsRoot"
            exit 0
          }
          $sdkDir = Get-ChildItem $kitsRoot -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $sdkDir) {
            Write-Host "Windows SDK version directory not found under $kitsRoot"
            exit 0
          }
          $toolDir = Join-Path $sdkDir.FullName 'x64'
          if ((Test-Path (Join-Path $toolDir 'makeappx.exe')) -and (Test-Path (Join-Path $toolDir 'signtool.exe'))) {
            $toolDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } else {
            Write-Host "Windows SDK tools not found yet in $toolDir; package.py will attempt installation if needed."
          }

      - name: Build PyInstaller + MSIX Store upload package
        shell: pwsh
        run: |
          python package.py --msix --msixupload --version "${{ steps.version.outputs.VERSION }}"

      - name: Collect x64 MSIX artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/releases | Out-Null
          Copy-Item "Muxiveo-${{ steps.version.outputs.VERSION }}.msix" "dist/releases/Muxiveo-${{ steps.version.outputs.VERSION }}.msix" -Force

      - name: Upload x64 MSIX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Muxiveo-MSIX-x64-${{ steps.version.outputs.VERSION }}
          path: |
            dist/releases/Muxiveo-${{ steps.version.outputs.VERSION }}.msix
            dist/releases/Muxiveo-${{ steps.version.outputs.VERSION }}.msixupload
          if-no-files-found: error
