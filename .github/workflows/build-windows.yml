name: Build Windows installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (ex: 1.3.1)"
        required: false
        default: ""

jobs:
  parity-gate:
    uses: ./.github/workflows/mediainfo-parity-multi-os.yml

  build:
    needs: parity-gate
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install PySide6>=6.6.0 pyinstaller

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $ver = "${{ github.event.inputs.version }}"
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $ver = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $ver = python -c "from core.version import APP_VERSION; print(APP_VERSION)"
          }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "Version: $ver"

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis --no-progress -y
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: Build PyInstaller + NSIS installer
        shell: pwsh
        run: |
          # Sur Windows, package.py détecte OS==Windows et enchaîne
          # PyInstaller → NSIS automatiquement
          python package.py --version "${{ steps.version.outputs.VERSION }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mediarecode-Setup-${{ steps.version.outputs.VERSION }}
          path: dist/releases/Mediarecode-Setup-${{ steps.version.outputs.VERSION }}.exe
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          FILE="dist/releases/Mediarecode-Setup-${{ steps.version.outputs.VERSION }}.exe"
          gh release view "$TAG" > /dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --notes ""
          gh release upload "$TAG" "$FILE" --clobber
        shell: bash
