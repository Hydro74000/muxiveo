name: MediaInfo Native Parity Multi-OS

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    paths:
      - "core/mediainfo_native/**"
      - "scripts/mediainfo_parity_matrix.py"
      - "scripts/verify_mediainfo_corpus.py"
      - "scripts/mediainfo_parity_manifest*.json"
      - "scripts/mediainfo_corpus_manifest*.json"
      - "mediarecode_corpus_real/**"
      - ".github/workflows/mediainfo-parity-multi-os.yml"
  push:
    branches:
      - main
      - master
      - levelup
    paths:
      - "core/mediainfo_native/**"
      - "scripts/mediainfo_parity_matrix.py"
      - "scripts/verify_mediainfo_corpus.py"
      - "scripts/mediainfo_parity_manifest*.json"
      - "scripts/mediainfo_corpus_manifest*.json"
      - "mediarecode_corpus_real/**"
      - ".github/workflows/mediainfo-parity-multi-os.yml"

jobs:
  parity:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y wget ca-certificates
          wget -q https://mediaarea.net/repo/deb/repo-mediaarea_1.0-26_all.deb
          sudo dpkg -i repo-mediaarea_1.0-26_all.deb
          sudo apt-get update -qq
          sudo apt-get install -y mediainfo

      - name: Install tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          function Test-OraclePath {
            param([string]$PathCandidate)
            if ([string]::IsNullOrWhiteSpace($PathCandidate)) { return $false }
            if (-not (Test-Path $PathCandidate)) { return $false }
            try {
              $output = & $PathCandidate --Version 2>&1 | Out-String
            }
            catch {
              return $false
            }
            return $output -match 'MediaInfoLib'
          }

          if (-not [string]::IsNullOrWhiteSpace($env:MEDIAINFO_ORACLE_BIN) -and (Test-OraclePath -PathCandidate $env:MEDIAINFO_ORACLE_BIN)) {
            Write-Host "Resolved oracle (pre-set): $env:MEDIAINFO_ORACLE_BIN"
            exit 0
          }

          function Resolve-OracleCandidate {
            $candidates = New-Object System.Collections.Generic.List[string]
            foreach ($candidate in @(
              'C:\ProgramData\chocolatey\bin\mediainfo.exe',
              'C:\ProgramData\chocolatey\bin\mediainfo-cli.exe',
              'C:\Program Files\MediaInfo\CLI\mediainfo.exe'
            )) {
              if (-not [string]::IsNullOrWhiteSpace($candidate)) {
                $candidates.Add($candidate)
              }
            }
            foreach ($root in @(
              'C:\ProgramData\chocolatey\lib\mediainfo\tools',
              'C:\ProgramData\chocolatey\lib\mediainfo',
              'C:\ProgramData\chocolatey\lib\mediainfo-cli\tools',
              'C:\ProgramData\chocolatey\lib\mediainfo-cli'
            )) {
              if (Test-Path $root) {
                Get-ChildItem -Path $root -Recurse -File -ErrorAction SilentlyContinue |
                  Where-Object { $_.Name -match '(?i)mediainfo.*\\.exe$|^MediaInfo\\.exe$' } |
                  ForEach-Object { $candidates.Add($_.FullName) }
              }
            }
            foreach ($name in @('mediainfo', 'MediaInfo', 'mediainfo-cli')) {
              $cmd = Get-Command $name -ErrorAction SilentlyContinue
              if ($cmd) {
                foreach ($pathCandidate in @($cmd.Path, $cmd.Source, $cmd.Definition)) {
                  if (-not [string]::IsNullOrWhiteSpace($pathCandidate)) {
                    $candidates.Add($pathCandidate)
                  }
                }
              }
              $whereOut = where.exe $name 2>$null
              if ($LASTEXITCODE -eq 0 -and $whereOut) {
                foreach ($line in $whereOut) {
                  if (-not [string]::IsNullOrWhiteSpace($line)) {
                    $candidates.Add($line)
                  }
                }
              }
            }
            foreach ($candidate in ($candidates | Select-Object -Unique)) {
              if (Test-OraclePath -PathCandidate $candidate) {
                return $candidate
              }
            }
            return $null
          }

          choco install mediainfo-cli -y --no-progress
          "$env:ChocolateyInstall\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          if (Test-Path 'C:\Program Files\MediaInfo') {
            'C:\Program Files\MediaInfo' | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          if (Test-Path 'C:\Program Files\MediaInfo\CLI') {
            'C:\Program Files\MediaInfo\CLI' | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

          $resolved = Resolve-OracleCandidate
          if ([string]::IsNullOrWhiteSpace($resolved)) {
            $version = '26.01'
            $zipPath = Join-Path $env:RUNNER_TEMP "MediaInfo_CLI_${version}_Windows_x64.zip"
            $extractDir = Join-Path $env:RUNNER_TEMP "mediainfo_cli_${version}"
            $url = "https://mediaarea.net/download/binary/mediainfo/${version}/MediaInfo_CLI_${version}_Windows_x64.zip"
            Invoke-WebRequest -Uri $url -OutFile $zipPath
            if (Test-Path $extractDir) {
              Remove-Item -Recurse -Force $extractDir
            }
            Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force
            Get-ChildItem -Path $extractDir -Recurse -File -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match '(?i)mediainfo.*\\.exe$|^MediaInfo\\.exe$' } |
              ForEach-Object {
                if ([string]::IsNullOrWhiteSpace($resolved) -and (Test-OraclePath -PathCandidate $_.FullName)) {
                  $resolved = $_.FullName
                }
              }
          }

          if ([string]::IsNullOrWhiteSpace($resolved)) {
            throw 'Unable to resolve MediaInfo CLI oracle after chocolatey install + official zip fallback'
          }
          (Split-Path -Parent $resolved) | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "MEDIAINFO_ORACLE_BIN=$resolved" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Resolved oracle in Windows install step: $resolved"

      - name: Install tools (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install mediainfo

      - name: Tool versions
        shell: pwsh
        run: |
          python --version
          if ($env:MEDIAINFO_ORACLE_BIN) {
            & $env:MEDIAINFO_ORACLE_BIN --Version
          }
          else {
            mediainfo --Version
          }

      - name: Resolve oracle binary path (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          function Test-OraclePath {
            param([string]$PathCandidate)
            if ([string]::IsNullOrWhiteSpace($PathCandidate)) { return $false }
            if (-not (Test-Path $PathCandidate)) { return $false }
            $tmp = [System.IO.Path]::GetTempFileName()
            $proc = $null
            try {
              $proc = Start-Process `
                -FilePath $PathCandidate `
                -ArgumentList '--Version' `
                -NoNewWindow `
                -PassThru `
                -RedirectStandardOutput $tmp `
                -RedirectStandardError $tmp
              if (-not $proc.WaitForExit(5000)) {
                $proc.Kill()
                return $false
              }
              $output = Get-Content -LiteralPath $tmp -Raw -ErrorAction SilentlyContinue
            }
            catch {
              return $false
            }
            finally {
              if ($proc -and -not $proc.HasExited) {
                try { $proc.Kill() } catch { }
              }
              Remove-Item -LiteralPath $tmp -ErrorAction SilentlyContinue
            }
            return $output -match 'MediaInfoLib'
          }

          $candidates = New-Object System.Collections.Generic.List[string]
          if ($env:RUNNER_OS -eq 'Windows') {
            $candidates.Add('C:\ProgramData\chocolatey\bin\mediainfo.exe')
            $candidates.Add('C:\ProgramData\chocolatey\bin\mediainfo-cli.exe')
            $candidates.Add('C:\Program Files\MediaInfo\CLI\mediainfo.exe')
            foreach ($root in @(
              'C:\ProgramData\chocolatey\lib\mediainfo\tools',
              'C:\ProgramData\chocolatey\lib\mediainfo',
              'C:\ProgramData\chocolatey\lib\mediainfo-cli\tools',
              'C:\ProgramData\chocolatey\lib\mediainfo-cli'
            )) {
              if (Test-Path $root) {
                Get-ChildItem -Path $root -Recurse -File -ErrorAction SilentlyContinue |
                  Where-Object { $_.Name -match '(?i)mediainfo.*\\.exe$|^MediaInfo\\.exe$' } |
                  ForEach-Object { $candidates.Add($_.FullName) }
              }
            }
          }

          foreach ($commandName in @('mediainfo', 'MediaInfo', 'mediainfo-cli')) {
            $cmd = Get-Command $commandName -ErrorAction SilentlyContinue
            if ($cmd) {
              foreach ($cmdPath in @($cmd.Path, $cmd.Source, $cmd.Definition)) {
                if (-not [string]::IsNullOrWhiteSpace($cmdPath)) {
                  $candidates.Add($cmdPath)
                }
              }
            }
          }

          if ($env:RUNNER_OS -eq 'Windows') {
            foreach ($whereName in @('mediainfo', 'MediaInfo', 'mediainfo-cli')) {
              $whereOut = where.exe $whereName 2>$null
              if ($LASTEXITCODE -eq 0 -and $whereOut) {
                foreach ($line in $whereOut) {
                  if (-not [string]::IsNullOrWhiteSpace($line)) {
                    $candidates.Add($line)
                  }
                }
              }
            }
          }

          $resolved = $null
          foreach ($candidate in ($candidates | Select-Object -Unique)) {
            if (Test-OraclePath -PathCandidate $candidate) {
              $resolved = $candidate
              break
            }
          }

          if ([string]::IsNullOrWhiteSpace($resolved)) {
            Write-Host "Oracle candidates tested:"
            foreach ($candidate in ($candidates | Select-Object -Unique)) {
              Write-Host " - $candidate"
            }
            throw "Unable to resolve a working MediaInfo CLI oracle binary"
          }

          $mi = $resolved.Trim()
          Write-Host "Resolved oracle: $mi"
          "MEDIAINFO_ORACLE_BIN=$mi" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Resolve oracle binary path (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mi="$(command -v mediainfo || true)"
          if [ -z "${mi}" ]; then
            echo "Unable to resolve mediainfo binary from PATH" >&2
            exit 1
          fi
          if ! "${mi}" --Version | grep -q "MediaInfoLib"; then
            echo "Resolved mediainfo binary is not a valid oracle: ${mi}" >&2
            exit 1
          fi
          echo "Resolved oracle: ${mi}"
          echo "MEDIAINFO_ORACLE_BIN=${mi}" >> "${GITHUB_ENV}"

      - name: Linux parity compatibility toggles
        if: runner.os == 'Linux'
        shell: pwsh
        run: |
          "MINFO_EMIT_FILE_CREATED_DATE=0" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify corpus manifest
        shell: pwsh
        run: |
          python scripts/verify_mediainfo_corpus.py --manifest scripts/mediainfo_corpus_manifest.real.json --root mediarecode_corpus_real

      - name: Guard no external runtime dependency
        shell: pwsh
        run: |
          python -m core.mediainfo_native.validation.no_external_guard

      - name: Parity strict (real)
        shell: pwsh
        run: |
          python scripts/mediainfo_parity_matrix.py --oracle-bin "$env:MEDIAINFO_ORACLE_BIN" --manifest scripts/mediainfo_parity_manifest.real.json --report scripts/mediainfo_parity_report.real.json

      - name: Parity extended (real + subrip)
        shell: pwsh
        run: |
          python scripts/mediainfo_parity_matrix.py --oracle-bin "$env:MEDIAINFO_ORACLE_BIN" --manifest scripts/mediainfo_parity_manifest.extended.json --report scripts/mediainfo_parity_report.extended.json

      - name: Parity expanded (multitrack/tags/chapters/vfr/hdr)
        shell: pwsh
        run: |
          python scripts/mediainfo_parity_matrix.py --oracle-bin "$env:MEDIAINFO_ORACLE_BIN" --manifest scripts/mediainfo_parity_manifest.expanded.json --report scripts/mediainfo_parity_report.expanded.json

      - name: Parity gate (no failed/no skipped)
        shell: pwsh
        run: |
          python scripts/mediainfo_parity_gate.py `
            --report scripts/mediainfo_parity_report.real.json `
            --report scripts/mediainfo_parity_report.extended.json `
            --report scripts/mediainfo_parity_report.expanded.json

      - name: Upload parity reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mediainfo-parity-reports-${{ runner.os }}
          path: |
            scripts/mediainfo_parity_report.real.json
            scripts/mediainfo_parity_report.extended.json
            scripts/mediainfo_parity_report.expanded.json
          if-no-files-found: warn

  aggregate-reports:
    needs: parity
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all parity artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mediainfo-parity-reports-*
          path: parity-artifacts

      - name: Validate downloaded reports
        run: |
          set -euo pipefail
          count=$(find parity-artifacts -type f -name 'mediainfo_parity_report.*.json' | wc -l)
          echo "Downloaded report files: $count"
          test "$count" -ge 9

      - name: Upload combined parity reports
        uses: actions/upload-artifact@v4
        with:
          name: mediainfo-parity-reports-all-os
          path: parity-artifacts
          if-no-files-found: error
